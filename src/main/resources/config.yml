# Schooltag Configuration

# Cài đặt chung
settings:
  # Prefix hiển thị
  prefix: "&6&lSchoolTag &8» &r"
  # Tự động lưu dữ liệu (phút)
  auto-save: 5

# Danh sách danh hiệu
tags:
  # Danh hiệu mặc định (ai cũng có)
  default:
    name: "&7Người Chơi"
    material: "NAME_TAG"
    lore:
      - "&7Danh hiệu mặc định"
    effects:
      damage-multiplier: 1.0
      health-multiplier: 1.0
    permission: "schooltag.default"  # Permission để sở hữu
    grant-permissions: []  # Permission được cấp khi đeo danh hiệu
    priority: 0

  # Danh hiệu tăng sát thương
  warrior:
    name: "&c&l⚔️ Chiến Binh"
    material: "DIAMOND_SWORD"
    lore:
      - "&7Tăng &c20% &7sát thương"
      - "&7Danh hiệu của chiến binh"
    effects:
      damage-multiplier: 1.2
      health-multiplier: 1.0
    permission: "schooltag.warrior"
    grant-permissions:
      - "warrior.damage.boost"
      - "warrior.special"
    priority: 1

  # Danh hiệu tăng máu
  tank:
    name: "&a&l🛡️ Tăng Máu"
    material: "SHIELD"
    lore:
      - "&7Tăng &a10% &7máu"
      - "&7Danh hiệu của người bảo vệ"
    effects:
      damage-multiplier: 1.0
      health-multiplier: 1.1
    permission: "schooltag.tank"
    grant-permissions:
      - "tank.health.boost"
      - "tank.defense"
    priority: 2

  # Danh hiệu VIP
  vip:
    name: "&6&l✨ VIP &e&l✨"
    material: "GOLDEN_APPLE"
    lore:
      - "&7Danh hiệu &6VIP"
      - "&7Nhận được nhiều ưu đãi"
    effects:
      damage-multiplier: 1.0
      health-multiplier: 1.0
    permission: "schooltag.vip"
    grant-permissions:
      - "vip.chat.color"
      - "vip.fly"
      - "vip.join.effect"
      - "vip.kick"
    priority: 3

  # Danh hiệu Admin
  admin:
    name: "&c&l🔱 &4&lADMIN &c&l🔱"
    material: "NETHER_STAR"
    lore:
      - "&c&lQuyền năng tối thượng"
    effects:
      damage-multiplier: 1.0
      health-multiplier: 1.0
    permission: "schooltag.admin"
    grant-permissions:
      - "*"  # Cấp tất cả quyền
    priority: 10

  # Danh hiệu Youtuber
  youtuber:
    name: "&f&l🎬 &c&lYouTuber &f&l🎬"
    material: "PLAYER_HEAD"
    lore:
      - "&7Danh hiệu của YouTuber"
    effects:
      damage-multiplier: 1.0
      health-multiplier: 1.0
    permission: "schooltag.youtuber"
    grant-permissions:
      - "youtuber.special"
      - "youtuber.fly"
      - "youtuber.nick"
    priority: 5

  # Danh hiệu Streamer
  streamer:
    name: "&5&l📺 &d&lStreamer &5&l📺"
    material: "ENDER_EYE"
    lore:
      - "&7Danh hiệu của Streamer"
    effects:
      damage-multiplier: 1.0
      health-multiplier: 1.0
    permission: "schooltag.streamer"
    grant-permissions:
      - "streamer.special"
      - "streamer.effect"
    priority: 4

  # Danh hiệu Halloween
  halloween:
    name: "&6&l🎃 &c&lHalloween &6&l🎃"
    material: "CARVED_PUMPKIN"
    lore:
      - "&6&lĐặc biệt cho mùa Halloween"
    effects:
      damage-multiplier: 1.15
      health-multiplier: 1.0
    permission: "schooltag.halloween"
    grant-permissions:
      - "halloween.pumpkin"
      - "halloween.costume"
    priority: 3

  # Danh hiệu Christmas
  christmas:
    name: "&c&l🎄 &a&lGiáng Sinh &c&l🎄"
    material: "CHEST_MINECART"
    lore:
      - "&a&lKhông khí Giáng Sinh"
    effects:
      damage-multiplier: 1.0
      health-multiplier: 1.15
    permission: "schooltag.christmas"
    grant-permissions:
      - "christmas.gift"
      - "christmas.snow"
    priority: 3

# GUI Settings
gui:
  title: "&6&l🎯 Danh Hiệu"
  size: 54
  filler:
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "
  control:
    previous:
      slot: 48
      material: "ARROW"
      name: "&6◀ Trang Trước"
    next:
      slot: 50
      material: "ARROW"
      name: "&6Trang Sau ▶"
    close:
      slot: 49
      material: "BARRIER"
      name: "&c✖ Đóng"
  selected:
    lore:
      - "&a&l✔ Đang sử dụng"
      - "&7Quyền được cấp: &e{grant-permissions}"
  unselected:
    lore:
      - "&7Click để chọn"
      - "&7Quyền được cấp: &e{grant-permissions}"
  lock:
    material: "BARRIER"
    name: "&c&l🔒 Khóa"
    lore:
      - "&7Bạn cần có permission: &e{permission}"
      - "&7Để mở khóa danh hiệu này"

# Message
messages:
  no-permission: "&cBạn không có quyền sử dụng lệnh này!"
  player-only: "&cLệnh này chỉ dành cho người chơi!"
  tag-selected: "&aBạn đã chọn danh hiệu &e{tag}"
  tag-removed: "&eBạn đã gỡ bỏ danh hiệu"
  reloaded: "&aPlugin đã được reload thành công!"
  tag-not-exist: "&cDanh hiệu không tồn tại!"
  tag-locked: "&cBạn chưa có permission để sở hữu danh hiệu này!"
  invalid-command: "&cLệnh không hợp lệ! Sử dụng: /tags hoặc /danhhieu"
  no-tag-permission: "&cBạn không có permission để sử dụng danh hiệu này!"
  permissions-granted: "&aĐã cấp quyền cho danh hiệu: &e{permissions}"
  permissions-removed: "&eĐã gỡ bỏ quyền của danh hiệu cũ"
